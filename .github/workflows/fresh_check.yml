name: FreshCheck

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Repo branch to run against"
        required: false
        default: "main"
        type: string
      smoke_test:
        description: "Run without committing and write the FreshCheck README to the step summary"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "15 0,12 * * *"

permissions:
  contents: write

concurrency:
  group: freshcheck
  cancel-in-progress: false

jobs:
  freshcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run FreshCheck
        run: python FreshCheck/fresh_check.py

      - name: Write smoke test summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_test }}
        shell: bash
        run: |
          {
            echo "### FreshCheck smoke test :rocket:"
            echo
            cat FreshCheck/README.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated FreshCheck outputs
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.smoke_test) }}
        shell: bash
        run: |
          git add \
            FreshCheck/README.md \
            FreshCheck/freshness_tree.json

          if git diff --cached --quiet; then
            echo "No FreshCheck changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update FreshCheck outputs"
          git push
